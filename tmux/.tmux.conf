set -g prefix C-Space

unbind ^
bind ^ source-file ~/.tmux.conf

setw -g mode-keys vi

set -g mouse on

bind v split-window -v -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"


set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'odedlaz/tmux-onedark-theme'
set -g @onedark_date_format "%d.%m.%y"

set -g @plugin 'christoomey/vim-tmux-navigator'

bind-key -n -r M-h resize-pane -L 5
bind-key -n -r M-l resize-pane -R 5
bind-key -n -r M-j resize-pane -D 5
bind-key -n -r M-k resize-pane -U 5

bind-key q kill-pane
bind-key x confirm-before -p "Kill window #W? (y/n)" kill-window
bind-key X confirm-before -p "Kill session #W? (y/n)" kill-session

bind-key b run-shell -b "tmux capture-pane -J -p | grep -oE '(https?):\/\/.*[^>]' | fzf-tmux -d20 --multi --bind 'alt-a:select-all,alt-d:deselect-all' | xargs -r open"

bind-key S switch-client -l
bind C command-prompt -p "New Session:" "new-session -A -s '%%'"


set -g base-index 1
set-option -g renumber-windows on

set -g status-position top

set-option -g detach-on-destroy off

run '~/.tmux/plugins/tpm/tpm'
